---
- name: Assert samba_admin_password is set
  assert:
    that: samba_admin_password | length > 0
    fail_msg: "samba_admin_password must be set — use: ansible-vault encrypt_string 'YourPassword' --name samba_admin_password"

- name: Install Samba AD packages
  apt:
    name:
      - samba
      - samba-dsdb-modules
      - samba-vfs-modules
      - winbind
      - libpam-winbind
      - libnss-winbind
      - krb5-user
      - acl
      - attr
    state: present

- name: Stop and disable services that conflict with samba-ad-dc
  service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - smbd
    - nmbd
    - winbind
  ignore_errors: true

- name: Check if domain already provisioned
  stat:
    path: /etc/samba/smb.conf.bak
  register: domain_provisioned

- name: Provision Samba AD domain
  command: >
    samba-tool domain provision
    --realm={{ samba_realm }}
    --domain={{ samba_domain }}
    --adminpass={{ samba_admin_password }}
    --dns-backend={{ samba_dns_backend }}
    --server-role=dc
    --use-rfc2307
  when: not domain_provisioned.stat.exists
  notify: Restart samba-ad-dc

- name: Copy Kerberos config generated by Samba
  copy:
    src: /var/lib/samba/private/krb5.conf
    dest: /etc/krb5.conf
    remote_src: true
    mode: "0644"
  when: not domain_provisioned.stat.exists

- name: Enable and start samba-ad-dc
  service:
    name: samba-ad-dc
    state: started
    enabled: true

- name: Allow Samba AD ports through UFW
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - {port: "53", proto: "tcp"}
    - {port: "53", proto: "udp"}
    - {port: "88", proto: "tcp"}
    - {port: "88", proto: "udp"}
    - {port: "135", proto: "tcp"}
    - {port: "139", proto: "tcp"}
    - {port: "389", proto: "tcp"}
    - {port: "389", proto: "udp"}
    - {port: "445", proto: "tcp"}
    - {port: "464", proto: "tcp"}
    - {port: "464", proto: "udp"}
    - {port: "636", proto: "tcp"}
    - {port: "3268", proto: "tcp"}
    - {port: "3269", proto: "tcp"}
