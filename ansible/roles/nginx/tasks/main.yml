---
- name: Install Nginx and Certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Deploy reverse proxy config
  copy:
    dest: /etc/nginx/sites-available/proxy.conf
    content: |
      # Reverse proxy — add a server block per backend service.
      # Override nginx_proxy_backends in host_vars to generate entries automatically.
      #
      # Example:
      # server {
      #     listen 80;
      #     server_name grafana.home.lab;
      #     location / {
      #         proxy_pass         http://127.0.0.1:3000;
      #         proxy_set_header   Host              $host;
      #         proxy_set_header   X-Real-IP         $remote_addr;
      #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      #         proxy_set_header   X-Forwarded-Proto $scheme;
      #     }
      # }
    mode: "0644"
  notify: Reload nginx

- name: Enable proxy site
  file:
    src: /etc/nginx/sites-available/proxy.conf
    dest: /etc/nginx/sites-enabled/proxy.conf
    state: link
  notify: Reload nginx

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: true

- name: Allow HTTP and HTTPS through UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
